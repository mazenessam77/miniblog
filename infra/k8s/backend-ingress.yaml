# ─────────────────────────────────────────────────────────────────────────────
#  Ingress — AWS ALB Ingress Controller
#  - Internet-facing ALB with HTTPS (port 443) + HTTP → HTTPS redirect
#  - ALB certificate managed by ACM (wildcard *.miniblog.com)
#  - ACM_CERT_ARN_PLACEHOLDER is replaced by CI with secrets.ACM_CERT_ARN
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: miniblog
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: miniblog-platform
  annotations:
    # ── AWS Load Balancer Controller Annotations ─────────────────
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # ── HTTPS + HTTP→HTTPS redirect ──────────────────────────────
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80},{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: "ACM_CERT_ARN_PLACEHOLDER"
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # ── Health Check Configuration ───────────────────────────────
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # ── Tags ─────────────────────────────────────────────────────
    alb.ingress.kubernetes.io/tags: "Project=miniblog,Environment=production"
spec:
  rules:
    - host: api.miniblog.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
