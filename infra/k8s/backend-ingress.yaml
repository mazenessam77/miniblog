# ─────────────────────────────────────────────────────────────────────────────
#  Ingress — AWS ALB Ingress Controller
#  - Creates an internet-facing Application Load Balancer
#  - Routes all /api/* and other paths to the backend service
#  - Health check on /health endpoint
#  - ALB is placed in PUBLIC subnets
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  namespace: miniblog
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: miniblog-platform
  annotations:
    # ── AWS Load Balancer Controller Annotations ─────────────────
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing           # Public ALB
    alb.ingress.kubernetes.io/target-type: ip                   # Route directly to pod IPs
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # For HTTPS add:
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...

    # ── Health Check Configuration ───────────────────────────────
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # ── Tags ─────────────────────────────────────────────────────
    alb.ingress.kubernetes.io/tags: "Project=miniblog,Environment=production"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
