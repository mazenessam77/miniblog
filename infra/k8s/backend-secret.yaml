# ─────────────────────────────────────────────────────────────────────────────
#  Backend Secret — Sensitive configuration
#  These values are injected as environment variables into every backend pod.
#  Matches the env vars read by:
#    - app/database/connection.py → DATABASE_URL
#    - app/services/auth.py      → SECRET_KEY
#
#  ⚠️  IMPORTANT: Replace placeholder values before deploying!
#  In production, use AWS Secrets Manager + External Secrets Operator
#  instead of storing secrets directly in Kubernetes.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: miniblog
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: miniblog-platform
type: Opaque
stringData:
  # ── Database Connection ───────────────────────────────────────────────────
  # Get the RDS endpoint after `terraform apply`:
  #   terraform output -raw rds_endpoint
  #
  # Format: postgresql://<username>:<password>@<rds_endpoint>/<database_name>
  DATABASE_URL: "postgresql://miniblog_admin:CHANGE_ME@REPLACE_WITH_RDS_ENDPOINT:5432/miniblog"

  # ── JWT Signing Key ───────────────────────────────────────────────────────
  # Generate a strong key:
  #   openssl rand -hex 32
  SECRET_KEY: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_HEX_32"

  # ── Rate Limiting — Redis ─────────────────────────────────────────────────
  # Get the ElastiCache endpoint after `terraform apply`:
  #   terraform output -raw redis_primary_endpoint
  #
  # Format: redis://<elasticache-primary-endpoint>:6379/0
  REDIS_URL: "redis://REPLACE_WITH_REDIS_ENDPOINT:6379/0"
