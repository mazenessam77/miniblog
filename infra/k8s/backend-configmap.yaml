# ─────────────────────────────────────────────────────────────────────────────
#  Backend ConfigMap — Non-sensitive configuration
#  These values are injected as environment variables into every backend pod.
#  Matches the env vars read by:
#    - app/main.py            → CORS_ORIGINS
#    - app/database/connection → (DATABASE_URL is in Secret, not here)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: miniblog
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: miniblog-platform
data:
  # ── CORS ─────────────────────────────────────────────────────────────────
  CORS_ORIGINS: "https://miniblog.com,https://www.miniblog.com"

  # ── Media (S3 photo uploads) ──────────────────────────────────────────────
  # Get bucket name after `terraform apply`:
  #   terraform output -raw media_bucket_name
  MEDIA_BUCKET: "miniblog-production-media-541405370428"
  AWS_REGION: "us-east-1"

  # ── Python / Uvicorn ─────────────────────────────────────────────────────
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
