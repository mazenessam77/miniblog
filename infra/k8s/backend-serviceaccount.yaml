# ─────────────────────────────────────────────────────────────────────────────
#  Backend ServiceAccount
#  Annotated for IRSA if the backend needs direct AWS API access.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: miniblog
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: miniblog-platform
  annotations:
    # IRSA role for S3 media presigned URL generation.
    # Value is injected by CI from BACKEND_IRSA_ROLE_ARN GitHub Secret.
    eks.amazonaws.com/role-arn: "REPLACE_WITH_BACKEND_IRSA_ROLE_ARN"
