# ─────────────────────────────────────────────────────────────────────────────
#  Backend ServiceAccount
#  Annotated for IRSA if the backend needs direct AWS API access.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: miniblog
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: miniblog-platform
  # Uncomment to enable IRSA (IAM Roles for Service Accounts):
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/miniblog-backend-role
