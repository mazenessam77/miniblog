# ─────────────────────────────────────────────────────────────────────────────
#  Pipeline 3: Frontend Deploy — Build React → S3 → CloudFront
#
#  Automates Step 5:
#    Build frontend with ALB URL → sync to S3
#
#  Triggers:
#    - PR with frontend/ changes   → build only (no deploy)
#    - Push to main with frontend/ → build + deploy to S3/CloudFront
# ─────────────────────────────────────────────────────────────────────────────
name: "🌐 Frontend Deploy"

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  NODE_VERSION: "20"

jobs:
  # ─── Build ──────────────────────────────────────────────────────────────
  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build React app
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
        run: |
          echo "Building with VITE_API_URL=$VITE_API_URL"
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 7

      - name: Build summary
        run: |
          echo "## 🔨 Frontend Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API URL | \`${{ secrets.API_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build size | $(du -sh frontend/dist | cut -f1) |" >> $GITHUB_STEP_SUMMARY

  # ─── Deploy to S3 + CloudFront (Step 5) ─────────────────────────────────
  deploy:
    name: "🚀 Deploy to S3"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist

      - name: Sync to S3
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          echo "📦 Uploading to s3://$S3_BUCKET ..."
          
          # Sync all files
          aws s3 sync dist/ s3://$S3_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"
          
          # Upload index.html and JSON with no-cache (always fetch fresh)
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          
          # Upload JSON files with no-cache, stripping the dist/ prefix from the S3 key
          find dist -name "*.json" | while read file; do
            key="${file#dist/}"
            aws s3 cp "$file" "s3://$S3_BUCKET/$key" \
              --cache-control "no-cache, no-store, must-revalidate"
          done
          
          echo "✅ S3 sync complete"

      - name: Deployment summary
        env:
          S3_WEBSITE: ${{ secrets.CLOUDFRONT_DOMAIN }}
        run: |
          echo "## 🌐 Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | \`${{ secrets.S3_BUCKET_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Website URL | http://$S3_WEBSITE |" >> $GITHUB_STEP_SUMMARY
          echo "| Files | $(find dist -type f | wc -l) files |" >> $GITHUB_STEP_SUMMARY
