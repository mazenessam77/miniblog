# ─────────────────────────────────────────────────────────────────────────────
#  Pipeline 1: Infrastructure — Terraform Plan / Apply
#
#  Automates Step 1: terraform apply → creates all AWS resources
#
#  Triggers:
#    - PR with infra/ changes    → terraform plan (comment on PR)
#    - Push to main with infra/  → terraform apply (auto-deploy)
# ─────────────────────────────────────────────────────────────────────────────
name: "Infrastructure"

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "!infra/k8s/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "!infra/k8s/**"
  workflow_dispatch:

env:
  TF_WORKING_DIR: infra
  AWS_REGION: ${{ secrets.AWS_REGION }}

permissions:
  contents: read
  pull-requests: write
  secrets: write

jobs:
  # ─── Terraform Plan ──────────────────────────────────────────────────
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Build Lambda package (Pillow for Python 3.11 Linux)
        run: |
          TARGET="infra/modules/media/lambda"
          pip install pillow \
            --target $TARGET/package \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: \
            --quiet
          cp $TARGET/resize.py $TARGET/package/resize.py
          cd $TARGET/package && zip -r ../resize.zip . && cd -

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}
          TF_VAR_alb_dns: ${{ secrets.ALB_DNS }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `####  Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            **Result:** ${{ steps.plan.outcome == 'success' && ' Plan succeeded' || ' Plan failed' }}

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Plan
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - name: Upload Lambda zip
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: infra/modules/media/lambda/resize.zip

  # ─── Terraform Apply (main branch only) ─────────────────────────────
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Download Lambda zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: infra/modules/media/lambda

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}
          TF_VAR_alb_dns: ${{ secrets.ALB_DNS }}
        run: terraform apply -auto-approve tfplan

      # ── Update GitHub Secrets with new infrastructure values ─────────
      - name: Update GitHub Secrets post-apply
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # Capture outputs
          ACM_CERT_ARN=$(terraform output -raw acm_certificate_arn 2>/dev/null || echo "")
          CF_DIST_ID=$(terraform output -raw frontend_cloudfront_distribution_id 2>/dev/null || echo "")
          S3_BUCKET=$(terraform output -raw frontend_s3_bucket 2>/dev/null || echo "")
          CF_DOMAIN=$(terraform output -raw frontend_cloudfront_domain 2>/dev/null || echo "")

          # Update secrets via GitHub CLI
          if [ -n "$ACM_CERT_ARN" ]; then
            echo "$ACM_CERT_ARN" | gh secret set ACM_CERT_ARN --repo "$REPO"
            echo "Updated ACM_CERT_ARN"
          fi
          if [ -n "$CF_DIST_ID" ]; then
            echo "$CF_DIST_ID" | gh secret set CLOUDFRONT_DISTRIBUTION_ID --repo "$REPO"
            echo "Updated CLOUDFRONT_DISTRIBUTION_ID"
          fi
          if [ -n "$S3_BUCKET" ]; then
            echo "$S3_BUCKET" | gh secret set S3_BUCKET_NAME --repo "$REPO"
            echo "Updated S3_BUCKET_NAME"
          fi
          if [ -n "$CF_DOMAIN" ]; then
            echo "$CF_DOMAIN" | gh secret set CLOUDFRONT_DOMAIN --repo "$REPO"
            echo "Updated CLOUDFRONT_DOMAIN"
          fi
          # Set API_URL so the frontend build uses the correct endpoint
          echo "https://api.miniblog.com" | gh secret set API_URL --repo "$REPO"
          echo "Updated API_URL"

      - name: Output Summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| EKS Cluster | $(terraform output -raw eks_cluster_name) |" >> $GITHUB_STEP_SUMMARY
          echo "| RDS Endpoint | \`(sensitive)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | $(terraform output -raw frontend_s3_bucket) |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront | $(terraform output -raw frontend_cloudfront_domain) |" >> $GITHUB_STEP_SUMMARY
          echo "| Site URL | $(terraform output -raw site_url) |" >> $GITHUB_STEP_SUMMARY
          echo "| API URL | $(terraform output -raw api_url) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Route53 Name Servers" >> $GITHUB_STEP_SUMMARY
          echo "Configure these at your domain registrar:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform output -json name_servers | jq -r '.[]' >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
