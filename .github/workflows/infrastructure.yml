# ─────────────────────────────────────────────────────────────────────────────
#  Pipeline 1: Infrastructure — Terraform Plan / Apply
#
#  Automates Step 1: terraform apply → creates all AWS resources
#
#  Triggers:
#    - PR with infra/ changes    → terraform plan (comment on PR)
#    - Push to main with infra/  → terraform apply (auto-deploy)
# ─────────────────────────────────────────────────────────────────────────────
name: "🏗️ Infrastructure"

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "!infra/k8s/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - "!infra/k8s/**"
  workflow_dispatch:

env:
  TF_WORKING_DIR: infra
  AWS_REGION: ${{ secrets.AWS_REGION }}

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── Terraform Plan ──────────────────────────────────────────────────────
  terraform-plan:
    name: "📋 Terraform Plan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### 🏗️ Terraform Plan
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            **Result:** ${{ steps.plan.outcome == 'success' && '✅ Plan succeeded' || '❌ Plan failed' }}
            
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Upload Plan
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

  # ─── Terraform Apply (main branch only) ─────────────────────────────────
  terraform-apply:
    name: "🚀 Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_rds_password: ${{ secrets.RDS_PASSWORD }}
        run: terraform apply -auto-approve tfplan

      - name: Output Summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## 🏗️ Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| EKS Cluster | $(terraform output -raw eks_cluster_name) |" >> $GITHUB_STEP_SUMMARY
          echo "| RDS Endpoint | \`(sensitive)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| S3 Bucket | $(terraform output -raw frontend_s3_bucket) |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront | $(terraform output -raw frontend_cloudfront_domain) |" >> $GITHUB_STEP_SUMMARY
